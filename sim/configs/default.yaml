# sim/configs/default.yaml
vehicle:
  model_type: kinematic
  wheelbase: 3.5
  steer_ratio: 17.5
  mass: 2440.0
  wheel_rolling_radius: 0.505
  windward_area: 8.0
  transmission_efficiency: 0.85
  transmission_ratio_D: 14.02

dynamic_vehicle:
  mass: 2440.0
  Iz: 9564.8
  lf: 1.354
  lr: 1.446
  wheel_radius: 0.329
  drag_coeff: 0.558
  frontal_area: 5.903
  air_density: 1.225
  rolling_coeff: 0.0065
  corner_stiff_f: 80000.0
  corner_stiff_r: 80000.0
  tire_friction_mu: 0.85
  track_width: 1.725
  steer_ratio: 16.39

# 混合动力学模型：Base 机理模型(Euler) + MLP 残差修正
# 参数必须与 MLP 训练时一致（corner_stiff=56000, air_density=1.206）
hybrid_dynamic_vehicle:
  mass: 2440.0
  Iz: 9564.8
  lf: 1.354
  lr: 1.446
  wheel_radius: 0.329
  drag_coeff: 0.558
  frontal_area: 5.903
  air_density: 1.206
  rolling_coeff: 0.0065
  corner_stiff_f: 56000.0
  corner_stiff_r: 56000.0
  tire_friction_mu: 0.85
  track_width: 1.725
  steer_ratio: 16.39
  reverse_sign_speed_mps: 0.5
  # MLP checkpoint 路径（相对于 sim/ 目录）
  checkpoint_path: configs/checkpoints/best_error_model_from_carsim.pth

# V2 动力学模型（逐轮胎力 + Euler 积分，用于 hybrid_v2）
# 参数必须与 MLP checkpoint 训练时一致
dynamic_v2_vehicle:
  mass: 2440.0
  Iz: 9564.8
  lf: 1.354
  lr: 1.446
  wheel_radius: 0.329
  drag_coeff: 0.558
  frontal_area: 5.903
  air_density: 1.206
  rolling_coeff: 0.0065
  corner_stiff_f: 56000.0
  corner_stiff_r: 56000.0
  tire_friction_mu: 0.85
  track_width: 1.725
  steer_ratio: 16.39
  reverse_sign_speed_mps: 0.5

# 牵引车-挂车双体动力学模型（外部仓库 truckdynamicmodel）
# 参数与 truckdynamicmodel/truck_trailer_residual_modular/constants.py BASE_MODEL_PARAMS 对齐
truck_trailer_vehicle:
  m_t: 9300.0          # 牵引车质量 (kg)
  Iz_t: 48639.0        # 牵引车横摆惯量
  L_t: 4.475           # 牵引车轴距 (m)
  a_t: 3.8             # 前轴到质心距离 (m)
  m_s_base: 15004.0    # 挂车基础质量 (kg)，决定 Iz_s 缩放基准
  Iz_s_base: 96659.0   # 挂车基础横摆惯量
  L_s: 8.0             # 挂车长度 (m)
  c_s: 4.0             # 挂车质心到铰接点距离 (m)
  Cf: 80000.0          # 牵引车前轴侧偏刚度
  Cr: 80000.0          # 牵引车后轴侧偏刚度
  Cs: 80000.0          # 挂车轴侧偏刚度
  wheel_radius: 0.5    # 车轮半径 (m)
  track_width: 1.8
  steering_ratio: 16.39
  rho: 1.225           # 空气密度
  CdA_t: 5.82          # 牵引车 Cd × A
  CdA_s: 6.50          # 挂车 Cd × A
  rolling_coeff: 0.006
  hitch_x: -0.331      # 铰接点偏移 x（牵引车体坐标系）
  hitch_y: 0.002
  min_speed_mps: 0.5
  # 运行时挂车质量（可改为 0 切到无挂车模式，阈值 1.0 kg）
  default_trailer_mass_kg: 15004.0
  # MLP 残差 checkpoint（相对 sim/ 目录）
  checkpoint_path: ../../truckdynamicmodel/truck_trailer_residual_modular/best_truck_trailer_error_model.pth

